<div class="bg-white dark:bg-gray-950 rounded-lg shadow overflow-hidden">
  <table class="min-w-full text-sm">
    <thead class="bg-gray-100 dark:bg-gray-900 text-left">
      <tr>
        @for (col of columns; track col) {
          <th class="px-4 py-2 font-semibold">
            {{ col.label }}
          </th>
        }
        @if (showActions) {
          <th class="px-4 py-2 font-semibold text-right">
            Actions
          </th>
        }
      </tr>
    </thead>
    <tbody>
      @for (row of data; track row) {
        <tr class="border-t border-gray-200 dark:border-gray-800">
          @for (col of columns; track col) {
            <td class="px-4 py-2">
              {{ row[col.key] }}
            </td>
          }
          @if (showActions) {
            <td class="px-4 py-2 text-right space-x-2">
              <button
                class="px-3 py-1 text-xs rounded bg-blue-600 text-white"
                (click)="edit.emit(row)"
                >
                Edit
              </button>
              <button
                class="px-3 py-1 text-xs rounded bg-red-600 text-white"
                (click)="remove.emit(row)"
                >
                Delete
              </button>
            </td>
          }
        </tr>
      }

      @if (!data || data.length === 0) {
        <tr>
          <td
            [attr.colspan]="columns.length + (showActions ? 1 : 0)"
            class="px-4 py-4 text-center text-gray-500"
            >
            No data
          </td>
        </tr>
      }
    </tbody>
  </table>
</div>
