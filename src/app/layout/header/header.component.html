<header class="bg-white dark:bg-gray-900 px-6 py-3 shadow flex items-center justify-between">
  <div class="font-semibold text-lg text-gray-800 dark:text-gray-100">
    Admin Dashboard
  </div>

  <div class="flex items-center gap-4">
    <button
      class="text-sm px-3 py-1 rounded border border-gray-300 dark:border-gray-600
             text-gray-700 dark:text-gray-200"
      (click)="theme.toggle()"
    >
      {{ theme.isDark() ? 'Light Mode' : 'Dark Mode' }}
    </button>

    <button
      class="bg-red-500 text-white text-sm px-3 py-1 rounded"
      (click)="logout()"
    >
      Logout
    </button>
  </div>
</header>
