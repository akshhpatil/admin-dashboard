<header class="bg-white/80 dark:bg-slate-900/80 backdrop-blur-md px-4 sm:px-6 py-3 border-b border-slate-200 dark:border-slate-800 flex items-center justify-between sticky top-0 z-30 transition-colors">
  
  <div class="flex items-center gap-3">
    <!-- Navbar Brand Title can go here, or we can use a Search bar instead -->
    <div class="hidden sm:flex items-center bg-slate-100 dark:bg-slate-800 rounded-full px-4 py-2 focus-within:ring-2 ring-blue-500/50 transition-all border border-transparent dark:border-slate-700">
      <svg class="w-4 h-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
      <input type="text" placeholder="Search..." class="bg-transparent border-none outline-none pl-3 text-[13px] font-medium text-slate-700 dark:text-slate-200 w-48 sm:w-64 placeholder:text-slate-400">
    </div>
  </div>

  <div class="flex items-center gap-3">
    
    <!-- Icon-Only Theme Toggle -->
    <button
      class="p-2.5 rounded-full border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 hover:bg-slate-50 dark:hover:bg-slate-700/50 text-slate-600 dark:text-slate-300 transition-all active:scale-95 shadow-sm"
      (click)="theme.toggle()"
      title="Toggle Dark Mode"
    >
      @if(theme.isDark()) {
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" /></svg>
      } @else {
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" /></svg>
      }
    </button>
    
    <!-- Notification Bell -->
    <button class="p-2.5 rounded-full border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 hover:bg-slate-50 dark:hover:bg-slate-700/50 text-slate-600 dark:text-slate-300 transition-all active:scale-95 shadow-sm relative">
       <span class="absolute top-1.5 right-1.5 w-2.5 h-2.5 rounded-full bg-red-500 border-2 border-white dark:border-slate-800"></span>
       <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path></svg>
    </button>

    <!-- Profile Dropdown Container -->
    <div class="relative profile-menu-container ml-1">
      <button 
        class="flex items-center gap-2 p-1 pl-3 pr-1.5 rounded-full border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 hover:bg-slate-50 dark:hover:bg-slate-700/50 transition-all active:scale-95 shadow-sm focus:outline-none"
        (click)="toggleProfile()"
      >
        <span class="text-[13px] font-bold text-slate-700 dark:text-slate-300 hidden sm:block">Admin</span>
        <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-blue-600 to-cyan-500 flex items-center justify-center text-white font-bold text-[13px] shadow-inner border border-slate-100 dark:border-slate-700">
          A
        </div>
      </button>

      <!-- Dropdown Menu -->
      @if (profileOpen()) {
        <div class="absolute right-0 mt-3 w-56 bg-white dark:bg-slate-800 rounded-2xl shadow-[0_20px_40px_-15px_rgba(0,0,0,0.15)] border border-slate-100 dark:border-slate-700 py-2 z-50 transform origin-top-right transition-all">
          <div class="px-5 py-3 border-b border-slate-100 dark:border-slate-700 mb-2 bg-slate-50/50 dark:bg-slate-900/50">
             <p class="text-[13px] font-bold text-slate-900 dark:text-white leading-tight">Administrator</p>
             <p class="text-[11px] font-medium text-slate-500 mt-0.5">admin@system.io</p>
          </div>
          
          <a routerLink="/profile" (click)="profileOpen.set(false)" class="flex items-center gap-3 px-5 py-2.5 text-[13px] font-medium text-slate-600 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700/50 hover:text-blue-600 dark:hover:text-blue-400 transition-colors">
            <svg class="w-4 h-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
            My Profile
          </a>
          <a routerLink="/settings" (click)="profileOpen.set(false)" class="flex items-center gap-3 px-5 py-2.5 text-[13px] font-medium text-slate-600 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700/50 hover:text-blue-600 dark:hover:text-blue-400 transition-colors">
            <svg class="w-4 h-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
            Settings
          </a>
          
          <div class="h-px bg-slate-100 dark:bg-slate-700 my-2"></div>
          
          <button (click)="logout()" class="w-full text-left flex items-center gap-3 px-5 py-2.5 text-[13px] font-bold text-red-600 hover:bg-red-50 dark:hover:bg-red-500/10 transition-colors">
            <svg class="w-4 h-4 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
            Logout
          </button>
        </div>
      }
    </div>

  </div>
</header>
