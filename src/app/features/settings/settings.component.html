<div class="h-full w-full bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-200 p-4 sm:p-8 animate-fade-in relative z-0">
  
  <div class="mb-8">
    <h1 class="text-3xl font-bold text-slate-900 dark:text-white tracking-tight">Settings</h1>
    <p class="text-slate-500 dark:text-slate-400 mt-2">Manage your account preferences and application settings.</p>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
    
    <!-- Profile Info Settings -->
    <div class="lg:col-span-2 space-y-8">
      
      <!-- Appearance Card -->
      <div class="bg-white dark:bg-slate-800 rounded-3xl p-6 sm:p-8 shadow-sm border border-slate-100 dark:border-slate-700/60 transition-all hover:shadow-md">
        <h2 class="text-xl font-bold text-slate-900 dark:text-white mb-6 flex items-center gap-2">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-purple-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
             <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
          </svg>
          Appearance
        </h2>
        
        <div class="flex items-center justify-between p-4 bg-slate-50 dark:bg-slate-900 rounded-2xl border border-slate-100 dark:border-slate-700/60">
          <div>
            <h3 class="font-bold text-slate-800 dark:text-slate-200 text-sm">Dark Mode</h3>
            <p class="text-slate-500 text-xs mt-1">Enable dark mode aesthetic across the dashboard.</p>
          </div>
          <!-- Global Theme Toggle Hooked up -->
          <button 
            class="relative inline-flex h-6 w-11 items-center rounded-full transition-colors focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2"
            [ngClass]="themeService.isDark() ? 'bg-blue-600' : 'bg-slate-300 dark:bg-slate-600'"
            (click)="themeService.toggle()">
            <span class="inline-block h-4 w-4 transform rounded-full bg-white transition-transform"
                  [ngClass]="themeService.isDark() ? 'translate-x-6' : 'translate-x-1'"></span>
          </button>
        </div>
      </div>

      <!-- Account Settings Card -->
      <div class="bg-white dark:bg-slate-800 rounded-3xl p-6 sm:p-8 shadow-sm border border-slate-100 dark:border-slate-700/60 transition-all hover:shadow-md">
        <h2 class="text-xl font-bold text-slate-900 dark:text-white mb-6 flex items-center gap-2">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
          </svg>
          Profile Details
        </h2>
        
        <div class="space-y-4">
          <div class="flex flex-col sm:flex-row gap-4">
            <div class="w-full">
              <label class="block text-xs font-semibold text-slate-700 dark:text-slate-300 mb-1 ml-1">Username</label>
              <input type="text" value="admin" disabled class="w-full px-4 py-2 bg-slate-100 dark:bg-slate-900 opacity-70 border border-slate-200 dark:border-slate-700 rounded-xl text-slate-700 dark:text-slate-400 text-sm cursor-not-allowed">
            </div>
            <div class="w-full">
              <label class="block text-xs font-semibold text-slate-700 dark:text-slate-300 mb-1 ml-1">Email</label>
              <input type="email" value="admin@system.io" class="w-full px-4 py-2 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-all text-slate-700 dark:text-slate-200 text-sm">
            </div>
          </div>
          <div>
             <label class="block text-xs font-semibold text-slate-700 dark:text-slate-300 mb-1 ml-1">Bio</label>
             <textarea rows="3" class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-all text-slate-700 dark:text-slate-200 text-sm resize-none" placeholder="A brief description about yourself..."></textarea>
          </div>
        </div>
      </div>
    </div>

    <!-- Right Sidebar Settings -->
    <div class="lg:col-span-1 space-y-8">
      
      <!-- Notifications -->
      <div class="bg-white dark:bg-slate-800 rounded-3xl p-6 sm:p-8 shadow-sm border border-slate-100 dark:border-slate-700/60 transition-all hover:shadow-md">
        <h2 class="text-xl font-bold text-slate-900 dark:text-white mb-6 flex items-center gap-2">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-orange-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
          </svg>
          Notifications
        </h2>
        
        <div class="space-y-4">
          
          <div class="flex items-center justify-between">
            <div>
              <h3 class="font-bold text-slate-800 dark:text-slate-200 text-sm">Email Alerts</h3>
            </div>
            <button class="relative inline-flex h-5 w-9 items-center rounded-full transition-colors focus:outline-none"
                    [ngClass]="settings.emailNotifications ? 'bg-blue-600' : 'bg-slate-300 dark:bg-slate-600'"
                    (click)="settings.emailNotifications = !settings.emailNotifications">
              <span class="inline-block h-3 w-3 transform rounded-full bg-white transition-transform"
                    [ngClass]="settings.emailNotifications ? 'translate-x-5' : 'translate-x-1'"></span>
            </button>
          </div>

          <div class="flex items-center justify-between border-t border-slate-100 dark:border-slate-700/60 pt-4">
            <div>
              <h3 class="font-bold text-slate-800 dark:text-slate-200 text-sm">SMS Alerts</h3>
            </div>
            <button class="relative inline-flex h-5 w-9 items-center rounded-full transition-colors focus:outline-none"
                    [ngClass]="settings.smsAlerts ? 'bg-blue-600' : 'bg-slate-300 dark:bg-slate-600'"
                    (click)="settings.smsAlerts = !settings.smsAlerts">
              <span class="inline-block h-3 w-3 transform rounded-full bg-white transition-transform"
                    [ngClass]="settings.smsAlerts ? 'translate-x-5' : 'translate-x-1'"></span>
            </button>
          </div>
          
        </div>
      </div>

      <!-- Security -->
      <div class="bg-white dark:bg-slate-800 rounded-3xl p-6 sm:p-8 shadow-sm border border-slate-100 dark:border-slate-700/60 transition-all hover:shadow-md">
        <h2 class="text-xl font-bold text-slate-900 dark:text-white mb-6 flex items-center gap-2">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-green-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
          </svg>
          Security
        </h2>
        
        <button class="w-full py-2.5 px-4 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl text-sm font-semibold text-slate-700 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors mb-4">
          Change Password
        </button>

        <div class="flex items-center justify-between mt-2 flex-wrap gap-2">
            <div>
              <h3 class="font-bold text-slate-800 dark:text-slate-200 text-sm">Two-Factor Auth</h3>
            </div>
            <button class="relative inline-flex h-5 w-9 items-center rounded-full transition-colors focus:outline-none shrink-0"
                    [ngClass]="settings.twoFactor ? 'bg-blue-600' : 'bg-slate-300 dark:bg-slate-600'"
                    (click)="settings.twoFactor = !settings.twoFactor">
              <span class="inline-block h-3 w-3 transform rounded-full bg-white transition-transform"
                    [ngClass]="settings.twoFactor ? 'translate-x-5' : 'translate-x-1'"></span>
            </button>
        </div>
      </div>

    </div>
  </div>

  <div class="mt-8 flex justify-end">
     <button (click)="saveSettings()" class="px-8 py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl shadow-lg shadow-blue-500/30 transition-all active:scale-95 flex items-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4" /></svg>
        Save All Changes
     </button>
  </div>

</div>
