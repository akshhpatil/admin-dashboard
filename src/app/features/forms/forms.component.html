<div class="h-full w-full bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-200 p-4 sm:p-8 animate-fade-in relative z-0">
  
  <div class="mb-8">
    <h1 class="text-3xl font-bold text-slate-900 dark:text-white tracking-tight">Forms Module</h1>
    <p class="text-slate-500 dark:text-slate-400 mt-2">Premium UI components for databinding and user input.</p>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
    
    <!-- Contact Form (Basic Inputs) -->
    <div class="bg-white dark:bg-slate-800 rounded-3xl p-6 sm:p-8 shadow-sm border border-slate-100 dark:border-slate-700/60 transition-all hover:shadow-md">
      <h2 class="text-xl font-bold text-slate-900 dark:text-white mb-6 flex items-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" />
        </svg>
        Quick Contact
      </h2>
      
      <form (ngSubmit)="onSubmitContact()" #contactFrm="ngForm" class="space-y-5">
        
        <!-- Name Input -->
        <div class="space-y-2 relative group">
          <label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Full Name</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400 group-focus-within:text-blue-500 transition-colors">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
              </svg>
            </div>
            <input type="text" [(ngModel)]="contactForm.name" name="name" required placeholder="John Doe"
              class="w-full pl-10 pr-4 py-2.5 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition-all text-slate-700 dark:text-slate-200 placeholder-slate-400">
          </div>
        </div>

        <!-- Email Input -->
        <div class="space-y-2 relative group">
          <label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Email Address</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400 group-focus-within:text-blue-500 transition-colors">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
              </svg>
            </div>
            <input type="email" [(ngModel)]="contactForm.email" name="email" required placeholder="john@example.com"
              class="w-full pl-10 pr-4 py-2.5 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition-all text-slate-700 dark:text-slate-200 placeholder-slate-400">
          </div>
        </div>

        <!-- Message Textarea -->
        <div class="space-y-2 relative group">
          <label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Message</label>
          <textarea [(ngModel)]="contactForm.message" name="message" rows="4" required placeholder="How can we help you?"
            class="w-full p-4 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition-all text-slate-700 dark:text-slate-200 placeholder-slate-400 resize-none"></textarea>
        </div>

        <button type="submit" [disabled]="!contactFrm.valid" 
          class="w-full mt-4 bg-blue-600 hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed text-white font-medium py-3 rounded-xl shadow-lg shadow-blue-500/30 transition-all active:scale-95 flex items-center justify-center gap-2">
          Send Message
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
          </svg>
        </button>
      </form>
    </div>

    <!-- Personal Info Form (Grid Layouts & Selects) -->
    <div class="bg-white dark:bg-slate-800 rounded-3xl p-6 sm:p-8 shadow-sm border border-slate-100 dark:border-slate-700/60 transition-all hover:shadow-md">
      <h2 class="text-xl font-bold text-slate-900 dark:text-white mb-6 flex items-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-green-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
           <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        Personal Information
      </h2>

      <form (ngSubmit)="onSubmitPersonal()" #personalFrm="ngForm" class="space-y-5">
        
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
          <!-- First Name -->
          <div class="space-y-2">
            <label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">First Name</label>
            <input type="text" [(ngModel)]="personalInfo.firstName" name="firstName" required
              class="w-full px-4 py-2.5 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl outline-none focus:border-green-500 focus:ring-2 focus:ring-green-500/20 transition-all text-slate-700 dark:text-slate-200 placeholder-slate-400">
          </div>
          <!-- Last Name -->
          <div class="space-y-2">
            <label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Last Name</label>
            <input type="text" [(ngModel)]="personalInfo.lastName" name="lastName" required
              class="w-full px-4 py-2.5 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl outline-none focus:border-green-500 focus:ring-2 focus:ring-green-500/20 transition-all text-slate-700 dark:text-slate-200 placeholder-slate-400">
          </div>
        </div>

        <div class="space-y-2">
          <label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Country</label>
          <div class="relative">
            <select [(ngModel)]="personalInfo.country" name="country" 
              class="w-full appearance-none px-4 py-2.5 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl outline-none focus:border-green-500 focus:ring-2 focus:ring-green-500/20 transition-all text-slate-700 dark:text-slate-200">
              <option>United States</option>
              <option>Canada</option>
              <option>United Kingdom</option>
              <option>Australia</option>
            </select>
            <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-slate-500">
               <svg class="w-4 h-4 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
            </div>
          </div>
        </div>

        <div class="space-y-2">
          <label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Street Address</label>
          <input type="text" [(ngModel)]="personalInfo.streetAddress" name="streetAddress"
              class="w-full px-4 py-2.5 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl outline-none focus:border-green-500 focus:ring-2 focus:ring-green-500/20 transition-all text-slate-700 dark:text-slate-200 placeholder-slate-400">
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-3 gap-5">
          <div class="space-y-2 sm:col-span-1">
             <label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">City</label>
             <input type="text" [(ngModel)]="personalInfo.city" name="city"
                class="w-full px-4 py-2.5 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl outline-none focus:border-green-500 focus:ring-2 focus:ring-green-500/20 transition-all text-slate-700 dark:text-slate-200 placeholder-slate-400">
          </div>
          <div class="space-y-2 sm:col-span-1">
             <label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">State</label>
             <input type="text" [(ngModel)]="personalInfo.state" name="state"
                class="w-full px-4 py-2.5 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl outline-none focus:border-green-500 focus:ring-2 focus:ring-green-500/20 transition-all text-slate-700 dark:text-slate-200 placeholder-slate-400">
          </div>
          <div class="space-y-2 sm:col-span-1">
             <label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">ZIP</label>
             <input type="text" [(ngModel)]="personalInfo.zip" name="zip"
                class="w-full px-4 py-2.5 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl outline-none focus:border-green-500 focus:ring-2 focus:ring-green-500/20 transition-all text-slate-700 dark:text-slate-200 placeholder-slate-400">
          </div>
        </div>

        <button type="submit" [disabled]="!personalFrm.valid" 
          class="w-full mt-4 bg-green-500 hover:bg-green-600 disabled:opacity-50 disabled:cursor-not-allowed text-white font-medium py-3 rounded-xl shadow-lg shadow-green-500/30 transition-all active:scale-95 flex items-center justify-center gap-2">
          Save Details
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
          </svg>
        </button>

      </form>
    </div>

  </div>
</div>
