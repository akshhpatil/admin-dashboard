<div class="h-full w-full bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-200 p-4 sm:p-8 animate-fade-in relative z-0">
  
  <div class="mb-8">
    <h1 class="text-3xl font-bold text-slate-900 dark:text-white tracking-tight">Forms Module</h1>
    <p class="text-slate-500 dark:text-slate-400 mt-2">Premium UI components for databinding and user input.</p>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
    
    <!-- Contact Form (Basic Inputs) -->
    <div class="bg-white dark:bg-slate-800 rounded-3xl p-6 sm:p-8 shadow-sm border border-slate-100 dark:border-slate-700/60 transition-all hover:shadow-md">
      <h2 class="text-xl font-bold text-slate-900 dark:text-white mb-6 flex items-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" />
        </svg>
        Quick Contact
      </h2>
      
      <form (ngSubmit)="onSubmitContact()" #contactFrm="ngForm" class="space-y-5">
        
        <!-- Name Input -->
        <div class="space-y-2 relative group">
          <label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Full Name</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400 group-focus-within:text-blue-500 transition-colors">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
              </svg>
            </div>
            <input type="text" [(ngModel)]="contactForm.name" name="name" required placeholder="John Doe"
              class="w-full pl-10 pr-4 py-2.5 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition-all text-slate-700 dark:text-slate-200 placeholder-slate-400">
          </div>
        </div>

        <!-- Email Input -->
        <div class="space-y-2 relative group">
          <label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Email Address</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400 group-focus-within:text-blue-500 transition-colors">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
              </svg>
            </div>
            <input type="email" [(ngModel)]="contactForm.email" name="email" required placeholder="john@example.com"
              class="w-full pl-10 pr-4 py-2.5 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition-all text-slate-700 dark:text-slate-200 placeholder-slate-400">
          </div>
        </div>

        <!-- Message Textarea -->
        <div class="space-y-2 relative group">
          <label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Message</label>
          <textarea [(ngModel)]="contactForm.message" name="message" rows="4" required placeholder="How can we help you?"
            class="w-full p-4 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition-all text-slate-700 dark:text-slate-200 placeholder-slate-400 resize-none"></textarea>
        </div>

        <button type="submit" [disabled]="!contactFrm.valid" 
          class="w-full mt-4 bg-blue-600 hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed text-white font-medium py-3 rounded-xl shadow-lg shadow-blue-500/30 transition-all active:scale-95 flex items-center justify-center gap-2">
          Send Message
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
          </svg>
        </button>
      </form>
    </div>

    <!-- Personal Info Form (Grid Layouts & Selects) -->
    <div class="bg-white dark:bg-slate-800 rounded-3xl p-6 sm:p-8 shadow-sm border border-slate-100 dark:border-slate-700/60 transition-all hover:shadow-md">
      <h2 class="text-xl font-bold text-slate-900 dark:text-white mb-6 flex items-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-green-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
           <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        Personal Information
      </h2>

      <form (ngSubmit)="onSubmitPersonal()" #personalFrm="ngForm" class="space-y-5">
        
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
          <!-- First Name -->
          <div class="space-y-2">
            <label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">First Name</label>
            <input type="text" [(ngModel)]="personalInfo.firstName" name="firstName" required
              class="w-full px-4 py-2.5 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl outline-none focus:border-green-500 focus:ring-2 focus:ring-green-500/20 transition-all text-slate-700 dark:text-slate-200 placeholder-slate-400">
          </div>
          <!-- Last Name -->
          <div class="space-y-2">
            <label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Last Name</label>
            <input type="text" [(ngModel)]="personalInfo.lastName" name="lastName" required
              class="w-full px-4 py-2.5 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl outline-none focus:border-green-500 focus:ring-2 focus:ring-green-500/20 transition-all text-slate-700 dark:text-slate-200 placeholder-slate-400">
          </div>
        </div>

        <div class="space-y-2">
          <label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Country</label>
          <div class="relative">
            <select [(ngModel)]="personalInfo.country" name="country" 
              class="w-full appearance-none px-4 py-2.5 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl outline-none focus:border-green-500 focus:ring-2 focus:ring-green-500/20 transition-all text-slate-700 dark:text-slate-200">
              <option>United States</option>
              <option>Canada</option>
              <option>United Kingdom</option>
              <option>Australia</option>
            </select>
            <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-slate-500">
               <svg class="w-4 h-4 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
            </div>
          </div>
        </div>

        <div class="space-y-2">
          <label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Street Address</label>
          <input type="text" [(ngModel)]="personalInfo.streetAddress" name="streetAddress"
              class="w-full px-4 py-2.5 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl outline-none focus:border-green-500 focus:ring-2 focus:ring-green-500/20 transition-all text-slate-700 dark:text-slate-200 placeholder-slate-400">
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-3 gap-5">
          <div class="space-y-2 sm:col-span-1">
             <label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">City</label>
             <input type="text" [(ngModel)]="personalInfo.city" name="city"
                class="w-full px-4 py-2.5 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl outline-none focus:border-green-500 focus:ring-2 focus:ring-green-500/20 transition-all text-slate-700 dark:text-slate-200 placeholder-slate-400">
          </div>
          <div class="space-y-2 sm:col-span-1">
             <label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">State</label>
             <input type="text" [(ngModel)]="personalInfo.state" name="state"
                class="w-full px-4 py-2.5 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl outline-none focus:border-green-500 focus:ring-2 focus:ring-green-500/20 transition-all text-slate-700 dark:text-slate-200 placeholder-slate-400">
          </div>
          <div class="space-y-2 sm:col-span-1">
             <label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">ZIP</label>
             <input type="text" [(ngModel)]="personalInfo.zip" name="zip"
                class="w-full px-4 py-2.5 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl outline-none focus:border-green-500 focus:ring-2 focus:ring-green-500/20 transition-all text-slate-700 dark:text-slate-200 placeholder-slate-400">
          </div>
        </div>

        <button type="submit" [disabled]="!personalFrm.valid" 
          class="w-full mt-4 bg-green-500 hover:bg-green-600 disabled:opacity-50 disabled:cursor-not-allowed text-white font-medium py-3 rounded-xl shadow-lg shadow-green-500/30 transition-all active:scale-95 flex items-center justify-center gap-2">
          Save Details
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
          </svg>
        </button>

      </form>
    </div>

  </div>
  
  <!-- Advanced Elements Section -->
  <div class="mt-8">
     <div class="bg-white dark:bg-slate-800 rounded-3xl p-6 sm:p-8 shadow-sm border border-slate-100 dark:border-slate-700/60 transition-all hover:shadow-md">
      <h2 class="text-xl font-bold text-slate-900 dark:text-white mb-8 flex items-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-purple-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 4a2 2 0 114 0v1a2 2 0 002 2h1a2 2 0 012 2v1a2 2 0 002 2v1a2 2 0 01-2 2h-1a2 2 0 00-2 2v1a2 2 0 01-2 2H9a2 2 0 01-2-2v-1a2 2 0 00-2-2H4a2 2 0 01-2-2v-1a2 2 0 002-2V9a2 2 0 012-2h1a2 2 0 002-2V4z" />
        </svg>
        Advanced Inputs
      </h2>
      
      <form (ngSubmit)="onSubmitAdvanced()" #advancedFrm="ngForm" class="space-y-8">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
          
          <!-- Column 1: Custom Selects -->
          <div class="space-y-6">
            <!-- Multi-Select with Tags -->
            <div class="space-y-3">
              <label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Multi-Select Fruits (Premium Tag UI)</label>
              <div class="flex flex-wrap gap-2 p-3 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-2xl min-h-12 transition-all focus-within:border-purple-500 focus-within:ring-2 focus-within:ring-purple-500/10">
                <div *ngIf="advancedForm.selectedFruits.length === 0" class="text-slate-400 text-sm px-2 py-1">Select fruits below...</div>
                <div *ngFor="let fruit of advancedForm.selectedFruits" class="flex items-center gap-1.5 bg-purple-100 dark:bg-purple-900/40 text-purple-700 dark:text-purple-300 px-3 py-1.5 rounded-xl text-sm font-semibold animate-scale-in">
                  {{fruit}}
                  <button type="button" (click)="toggleFruit(fruit)" class="hover:text-purple-900 dark:hover:text-purple-100 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
                      <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" />
                    </svg>
                  </button>
                </div>
              </div>
              <!-- Selection Chips -->
              <div class="flex flex-wrap gap-2 pt-1">
                <button type="button" *ngFor="let option of fruitOptions" 
                   (click)="toggleFruit(option)"
                   class="px-4 py-1.5 rounded-full text-xs font-bold transition-all border"
                   [ngClass]="isFruitSelected(option) ? 'bg-purple-600 text-white border-purple-600' : 'bg-white dark:bg-slate-800 text-slate-500 dark:text-slate-400 border-slate-200 dark:border-slate-700 hover:border-purple-400 hover:bg-slate-50'">
                  {{option}}
                </button>
              </div>
            </div>

            <!-- Premium Dropdown -->
            <div class="space-y-3">
              <label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Department (Premium Dropdown)</label>
              <div class="relative group">
                <select [(ngModel)]="advancedForm.department" name="department" 
                  class="w-full appearance-none px-4 py-3 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-2xl outline-none focus:border-purple-500 focus:ring-2 focus:ring-purple-500/20 transition-all text-slate-700 dark:text-slate-200 font-medium">
                  <option *ngFor="let dept of departments" [value]="dept">{{dept}}</option>
                </select>
                <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-purple-500">
                   <svg class="w-5 h-5 transition-transform group-focus-within:rotate-180" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                     <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7"></path>
                   </svg>
                </div>
              </div>
            </div>
          </div>

          <!-- Column 2: Date and Time -->
          <div class="space-y-6">
            <!-- Date Picker -->
            <div class="space-y-3">
              <label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                </svg>
                Select Date
              </label>
              <div class="relative">
                <input type="date" [(ngModel)]="advancedForm.birthDate" name="birthDate"
                  class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-2xl outline-none focus:border-purple-500 focus:ring-2 focus:ring-purple-500/20 transition-all text-slate-700 dark:text-slate-200 [color-scheme:light] dark:[color-scheme:dark]">
              </div>
            </div>

            <!-- Time Picker -->
            <div class="space-y-3">
              <label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                Select Time
              </label>
              <div class="relative">
                <input type="time" [(ngModel)]="advancedForm.meetingTime" name="meetingTime"
                  class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-2xl outline-none focus:border-purple-500 focus:ring-2 focus:ring-purple-500/20 transition-all text-slate-700 dark:text-slate-200 [color-scheme:light] dark:[color-scheme:dark]">
              </div>
            </div>

            <!-- Datetime Picker (Combined) -->
            <div class="space-y-3">
              <label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                Appointment Date & Time
              </label>
              <div class="relative">
                <input type="datetime-local" [(ngModel)]="advancedForm.appointmentDateTime" name="appointmentDateTime"
                  class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-2xl outline-none focus:border-purple-500 focus:ring-2 focus:ring-purple-500/20 transition-all text-slate-700 dark:text-slate-200 [color-scheme:light] dark:[color-scheme:dark]">
              </div>
            </div>
          </div>
        </div>

        <button type="submit"
          class="w-full mt-4 bg-purple-600 hover:bg-purple-700 text-white font-medium py-3.5 rounded-2xl shadow-xl shadow-purple-500/20 transition-all active:scale-95 flex items-center justify-center gap-3">
          Process Advanced Parameters
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
          </svg>
        </button>
      </form>
    </div>
  </div>
</div>
