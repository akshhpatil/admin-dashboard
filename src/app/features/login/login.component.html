<div
  class="min-h-screen flex items-center justify-center p-4 bg-gradient-to-br from-[#ebe6ff] via-white to-[#cce8eb] dark:from-slate-900 dark:via-slate-900 dark:to-slate-800">

  <div class="relative w-full max-w-[420px] z-10">
    <div
      class="bg-white dark:bg-slate-800 p-8 sm:p-10 rounded-[2rem] shadow-[0_20px_50px_-12px_rgba(0,0,0,0.1)] dark:shadow-none border border-slate-100 dark:border-slate-700">

      <div class="text-center mb-8">
        <h2 class="text-3xl font-black text-slate-900 dark:text-white mb-2">
          Admin Login
        </h2>
        <p class="text-[13px] text-slate-500 dark:text-slate-400">
          Welcome back! Please enter your details.
        </p>
      </div>

      <div class="space-y-5">
        <!-- Username -->
        <div>
          <label class="block text-[13px] font-bold text-slate-700 dark:text-slate-300 mb-2" for="username">
            Username
          </label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
              <svg class="h-4 w-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
              </svg>
            </div>
            <input id="username" type="text" [(ngModel)]="username"
              class="block w-full pl-11 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 text-slate-900 dark:text-slate-100 px-4 py-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 transition-all text-sm placeholder:text-slate-300"
              placeholder="Enter your username" />
          </div>
        </div>

        <!-- Password -->
        <div>
          <label class="block text-[13px] font-bold text-slate-700 dark:text-slate-300 mb-2" for="password">
            Password
          </label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
              <svg class="h-4 w-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
              </svg>
            </div>
            <input id="password" type="password" [(ngModel)]="password"
              class="block w-full pl-11 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 text-slate-900 dark:text-slate-100 px-4 py-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 transition-all text-sm placeholder:text-slate-300"
              placeholder="••••••••" />
          </div>
        </div>

        <div class="flex items-center justify-between pt-1 pb-1">
          <div class="flex items-center">
            <input id="remember-me" name="remember-me" type="checkbox"
              class="h-4 w-4 text-blue-600 focus:ring-blue-500 border-slate-300 rounded cursor-pointer">
            <label for="remember-me" class="ml-2 block text-[13px] text-slate-600 dark:text-slate-400 cursor-pointer">
              Remember me
            </label>
          </div>
          <div class="text-[13px]">
            <a href="#" class="font-bold text-blue-600 hover:text-blue-500 transition-colors">
              Forgot password?
            </a>
          </div>
        </div>

        <!-- Login button -->
        <button (click)="login()"
          class="w-full bg-gradient-to-r from-blue-600 to-cyan-500 hover:opacity-90 text-white font-bold flex items-center justify-center gap-2 py-3 rounded-xl shadow-md transition-all active:scale-[0.98] mt-2 group text-[14px]">
          <span>Sign In</span>
          <svg class="w-4 h-4 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor"
            viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path>
          </svg>
        </button>

        <!-- Demo login details -->
        <div class="mt-8 pt-6 border-t border-slate-100 dark:border-slate-700/50">
          <p class="text-[11px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider mb-3 text-center">
            Demo Credentials
          </p>
          <div class="flex justify-center">
            <button (click)="fillCredentials('admin', '123')"
              class="w-full flex flex-col items-center p-3 rounded-xl border border-slate-100 dark:border-slate-700 hover:border-blue-200 dark:hover:border-blue-900/50 hover:bg-blue-50/30 dark:hover:bg-blue-900/10 transition-all text-center group">
              <span class="text-[11px] font-bold text-blue-600 dark:text-blue-400 mb-0.5">Admin Account</span>
              <span class="text-[12px] text-slate-500 dark:text-slate-400 font-medium tracking-wide">Username: admin / Password: 123</span>
            </button>
          </div>
        </div>

        <!-- Error -->
        @if (error) {
        <div
          class="mt-4 p-3 rounded-xl bg-red-50 dark:bg-red-900/20 border border-red-100 dark:border-red-800/50 flex items-center gap-3 text-red-500 dark:text-red-400">
          <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"
            xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
          </svg>
          <p class="text-[13px] font-medium">{{ error }}</p>
        </div>
        }
      </div>

    </div>
  </div>
</div>
