<div class="flex items-center justify-center h-screen bg-gray-100 dark:bg-gray-900">

  <div class="bg-white dark:bg-gray-800 w-96 p-8 rounded-xl shadow-xl">

    <h2 class="text-2xl font-bold text-center mb-6 text-gray-800 dark:text-gray-100">
      Admin Login
    </h2>

    <!-- Username -->
    <input
      type="text"
      [(ngModel)]="username"
      class="w-full border border-gray-300 dark:border-gray-600
             bg-gray-50 dark:bg-gray-700 text-gray-900 dark:text-gray-100
             p-3 rounded mb-4 focus:ring focus:ring-blue-300 outline-none"
      placeholder="Username"
      />

      <!-- Password -->
      <input
        type="password"
        [(ngModel)]="password"
      class="w-full border border-gray-300 dark:border-gray-600
             bg-gray-50 dark:bg-gray-700 text-gray-900 dark:text-gray-100
             p-3 rounded mb-4 focus:ring focus:ring-blue-300 outline-none"
        placeholder="Password"
        />

        <!-- Login button -->
        <button
          (click)="login()"
      class="w-full bg-blue-600 hover:bg-blue-700 
             text-white py-2 rounded transition"
          >
          Login
        </button>

        <!-- Error -->
        @if (error) {
          <p class="text-red-500 mt-4 text-center">
            {{ error }}
          </p>
        }

      </div>
    </div>
