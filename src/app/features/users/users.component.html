<div class="space-y-6">
  <!-- Page Header -->
  <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
    <div>
      <h1 class="text-2xl font-extrabold text-slate-900 dark:text-white tracking-tight">Users Management</h1>
      <p class="text-[13px] text-slate-500 dark:text-slate-400 mt-1">Manage system users, roles, and accesses.</p>
    </div>

    <button
      class="bg-blue-600 hover:bg-blue-700 text-white text-[14px] font-semibold px-5 py-2.5 rounded-xl shadow-sm transition-all active:scale-95 flex items-center gap-2"
      (click)="openCreate()"
    >
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
      Add User
    </button>
  </div>

  <!-- Search & Filters -->
  <div class="bg-white dark:bg-slate-800 p-4 rounded-2xl border border-slate-100 dark:border-slate-700 shadow-sm flex items-center">
    <div class="relative w-full max-w-sm">
      <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
        <svg class="w-4 h-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
      </div>
      <input
        type="text"
        [(ngModel)]="search"
        placeholder="Search users..."
        class="w-full pl-10 pr-4 py-2.5 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl text-[13px] focus:outline-none focus:ring-2 focus:ring-blue-500/50 transition-all placeholder:text-slate-400 text-slate-900 dark:text-slate-100"
      />
    </div>
  </div>

  <!-- Table Component Container -->
  <div class="bg-white dark:bg-slate-800 rounded-2xl border border-slate-100 dark:border-slate-700 shadow-sm overflow-hidden">
    <app-table
      [columns]="columns"
      [data]="filteredUsers"
      (edit)="openEdit($event)"
      (remove)="delete($event)"
      class="block w-full overflow-x-auto"
    >
    </app-table>
  </div>

  <!-- Modal -->
  @if (showModal) {
    <div class="fixed inset-0 bg-slate-900/40 backdrop-blur-[2px] flex items-center justify-center z-[100] p-4">
      <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl w-full max-w-md border border-slate-100 dark:border-slate-700 overflow-hidden transform transition-all">
        
        <div class="px-6 py-4 border-b border-slate-100 dark:border-slate-700 flex justify-between items-center bg-slate-50/50 dark:bg-slate-800/50">
          <h2 class="text-lg font-extrabold text-slate-800 dark:text-white">
            {{ isEdit ? 'Edit User' : 'Create User' }}
          </h2>
          <button class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 p-1" (click)="showModal = false">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
          </button>
        </div>

        <div class="px-6 py-6 space-y-5">
          <div>
            <label class="block text-[13px] font-bold text-slate-700 dark:text-slate-300 mb-2">Name</label>
            <input
              type="text"
              [(ngModel)]="currentUser.name"
              class="w-full px-4 py-2.5 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500/50 text-[13px] transition-all text-slate-900 dark:text-slate-100 placeholder:text-slate-400"
              placeholder="e.g. Jane Doe"
            />
          </div>
          <div>
            <label class="block text-[13px] font-bold text-slate-700 dark:text-slate-300 mb-2">Email</label>
            <input
              type="email"
              [(ngModel)]="currentUser.email"
              class="w-full px-4 py-2.5 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500/50 text-[13px] transition-all text-slate-900 dark:text-slate-100 placeholder:text-slate-400"
              placeholder="e.g. jane@company.com"
            />
          </div>
          <div>
            <label class="block text-[13px] font-bold text-slate-700 dark:text-slate-300 mb-2">Role</label>
            <div class="relative">
              <select
                [(ngModel)]="currentUser.role"
                class="w-full px-4 py-2.5 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500/50 text-[13px] transition-all appearance-none text-slate-900 dark:text-slate-100"
              >
                <option value="admin">Admin</option>
                <option value="manager">Manager</option>
                <option value="viewer">Viewer</option>
              </select>
              <div class="absolute inset-y-0 right-0 flex items-center px-4 pointer-events-none text-slate-500">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
              </div>
            </div>
          </div>
          
          <div class="flex items-center gap-2 pt-2">
            <input
              id="active"
              type="checkbox"
              [(ngModel)]="currentUser.isActive"
              class="w-4 h-4 text-blue-600 rounded border-slate-300 focus:ring-blue-500 cursor-pointer"
            />
            <label for="active" class="text-[13px] font-medium text-slate-700 dark:text-slate-300 cursor-pointer">Account is Active</label>
          </div>
        </div>
        
        <div class="px-6 py-4 border-t border-slate-100 dark:border-slate-700 bg-slate-50/50 dark:bg-slate-800/50 flex justify-end gap-3">
          <button
            class="px-4 py-2 rounded-xl border border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 text-[13px] font-bold transition-colors"
            (click)="showModal = false"
          >
            Cancel
          </button>
          <button
            class="px-5 py-2 rounded-xl bg-blue-600 hover:bg-blue-700 text-white text-[13px] font-bold shadow-sm transition-colors"
            (click)="save()"
          >
            Save User
          </button>
        </div>

      </div>
    </div>
  }
</div>
